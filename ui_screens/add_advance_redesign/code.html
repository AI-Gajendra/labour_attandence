<body class="bg-surface text-on-surface min-h-screen pb-32">
<!-- TopAppBar -->
<header class="bg-[#121826] dark:bg-[#121826] shadow-[0_8px_24px_0_rgba(21,27,41,0.06)] fixed top-0 w-full z-50">
<div class="flex items-center justify-between px-6 pt-8 pb-4 w-full">
<div class="flex items-center gap-4">
<button class="text-[#10B981] hover:opacity-80 transition-opacity active:scale-95 duration-150">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-white font-['Manrope'] font-bold text-lg tracking-tight">Add Advance</h1>
</div>
<div class="text-white font-bold text-xl">
<!-- Brand Anchor Placeholder -->
</div>
</div>
</header>
<main class="pt-28 px-6 space-y-8 max-w-md mx-auto">
<!-- Editorial Context Header -->
<section class="space-y-1">
<p class="text-on-surface-variant font-label text-[10px] uppercase tracking-widest">Financial Ledger</p>
<h2 class="text-on-surface font-headline font-extrabold text-3xl tracking-tight leading-tight">Worker Salary <br/>Advance</h2>
</section>
<!-- Form Body -->
<form class="space-y-6">
<!-- Worker Selector -->
<div class="space-y-2">
<label class="text-on-surface-variant font-label text-xs font-semibold ml-1">Select Worker</label>
<div class="h-14 px-4 bg-surface-container-lowest border border-outline-variant/15 rounded-xl flex items-center justify-between shadow-[0_8px_24px_0_rgba(21,27,41,0.04)] hover:bg-surface-container-low transition-colors cursor-pointer">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full overflow-hidden bg-primary-fixed">
<img class="w-full h-full object-cover" data-alt="professional portrait of a confident worker with clear dark hair and approachable smile" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAUo4JoVtjhLraPaSjVWu5IFLZn2uWmZlKj-LX5WYqEgpnSqunx7I8I4kHoFcoP6DYF0VTc1yygvQv6xHSD_ld8_rJxaRkKCzcn5vYTJizWL-kx7a9DQlm_YMqVYL_zxyS6uuwpxMZWjLZoVzAugZ06PAAndCQZQHQFWAgOSivGA4u4gUn1uiRJ_Av7imJRCpFgry6nhGzRmnjOKYzwKEtViiDioHPQtt5SySC9hqGyvn773qv8NbHhGulWAz-E3eql1lqlSk5ZKR8"/>
</div>
<span class="font-body font-semibold text-on-surface">Marcus Chen</span>
</div>
<span class="material-symbols-outlined text-outline" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Amount Input (Calculator Style) -->
<div class="space-y-2">
<label class="text-on-surface-variant font-label text-xs font-semibold ml-1">Advance Amount</label>
<div class="bg-surface-container-low border border-outline-variant/30 rounded-[2rem] p-8 text-center flex flex-col items-center justify-center gap-2">
<span class="text-on-surface font-headline font-extrabold text-5xl tracking-tighter">₹2,000</span>
<div class="px-4 py-1.5 bg-secondary/10 rounded-full">
<span class="text-secondary font-label text-[10px] font-bold uppercase tracking-widest">Available Credit: ₹15,000</span>
</div>
</div>
</div>
<!-- Date Display (Read Only) -->
<div class="space-y-2">
<label class="text-on-surface-variant font-label text-xs font-semibold ml-1">Transaction Date</label>
<div class="h-14 px-4 bg-surface-container-lowest/50 border border-outline-variant/10 rounded-xl flex items-center gap-3">
<span class="material-symbols-outlined text-outline text-lg" data-icon="calendar_today">calendar_today</span>
<span class="font-body font-medium text-on-surface-variant">Oct 24, 2023</span>
</div>
</div>
<!-- Payment Method Card (Asymmetric Layout Example) -->
<div class="p-4 bg-primary-container rounded-2xl flex items-center gap-4 text-white overflow-hidden relative">
<div class="absolute -right-4 -top-4 w-24 h-24 bg-white/5 rounded-full blur-2xl"></div>
<div class="w-12 h-12 rounded-xl bg-white/10 flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-secondary-fixed" data-icon="account_balance_wallet">account_balance_wallet</span>
</div>
<div>
<p class="font-label text-[10px] uppercase tracking-widest text-on-primary-container">Primary Source</p>
<p class="font-body font-semibold">Petty Cash Reservoir</p>
</div>
</div>
</form>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full h-14 bg-gradient-to-r from-[#10B981] to-[#0d9488] text-white font-headline font-bold text-base tracking-wide rounded-xl shadow-[0_12px_24px_-8px_rgba(16,185,129,0.4)] active:scale-95 transition-transform">
                SAVE ADVANCE
            </button>
</div>

<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 py-3 pb-safe bg-white/80 dark:bg-[#121826]/80 backdrop-blur-xl z-50 rounded-t-[1.5rem] shadow-[0_-8px_24px_0_rgba(21,27,41,0.06)]">
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all" href="#">
<span class="material-symbols-outlined" data-icon="group">group</span>
<span class="font-['Inter'] font-medium text-[10px] uppercase tracking-widest mt-1">Workforce</span>
</a>
<a class="flex flex-col items-center justify-center bg-[#10B981]/10 text-[#10B981] rounded-full px-4 py-2 scale-90 transition-transform" href="#">

<span class="font-['Inter'] font-medium text-[10px] uppercase tracking-widest mt-1">Advances</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all" href="#">
<span class="material-symbols-outlined" data-icon="account_balance_wallet">account_balance_wallet</span>
<span class="font-['Inter'] font-medium text-[10px] uppercase tracking-widest mt-1">Payroll</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Inter'] font-medium text-[10px] uppercase tracking-widest mt-1">Profile</span>
</a>
</nav>
